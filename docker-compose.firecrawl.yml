# Firecrawl self-hosted services — compose override for PropIntel.
#
# Prerequisites:
#   1. Run scripts/setup-firecrawl.sh  (clones Firecrawl source into ./firecrawl/)
#   2. Add FIRECRAWL_API_URL=http://localhost:3002 to your .env
#   3. Ensure OPENAI_API_KEY is set in .env (used by Firecrawl for JSON extraction)
#
# Start everything:
#   docker compose -f docker-compose.yml -f docker-compose.firecrawl.yml up --build -d
#
# Firecrawl API:       http://localhost:3002
# No Firecrawl API key needed — self-hosted runs without authentication.

services:

  # ── NuQ-aware PostgreSQL ───────────────────────────────────────
  # Custom image from Firecrawl source — includes the NuQ schema migrations
  # as init scripts; a plain postgres image is missing these tables.
  firecrawl-postgres:
    build:
      context: ./firecrawl/apps/nuq-postgres
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ── RabbitMQ — required by Firecrawl's NuQ queue layer ────────
  firecrawl-rabbitmq:
    image: rabbitmq:3-management
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "check_running"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── Browser renderer (Playwright / Chromium) ──────────────────
  firecrawl-playwright:
    build:
      context: ./firecrawl/apps/playwright-service-ts
      args:
        PORT: "3000"
    environment:
      PORT: "3000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3000/health',r=>process.exit(r.statusCode<400?0:1)).on('error',()=>process.exit(1))\""]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: "3G"

  # ── Firecrawl API + worker ─────────────────────────────────────
  firecrawl-api:
    build:
      context: ./firecrawl/apps/api
    ports:
      - "3002:3002"
    environment:
      HOST: "0.0.0.0"
      PORT: "3002"

      # No Supabase / DB auth — open self-hosted mode
      USE_DB_AUTHENTICATION: "false"

      # Shared Redis from PropIntel's docker-compose.yml
      REDIS_URL: "redis://redis:6379"
      REDIS_RATE_LIMIT_URL: "redis://redis:6379"

      # Playwright browser renderer (internal service name)
      PLAYWRIGHT_MICROSERVICE_URL: "http://firecrawl-playwright:3000/scrape"

      # OpenAI key — required for JSON schema extraction
      OPENAI_API_KEY: "${OPENAI_API_KEY}"

      # Worker concurrency — tune for your machine
      NUM_WORKERS_PER_QUEUE: "4"
      CRAWL_CONCURRENT_REQUESTS: "8"
      MAX_CONCURRENT_JOBS: "4"

      # Admin panel password (change if exposed to network)
      BULL_AUTH_KEY: "propintel-local"

      # Disable telemetry
      POSTHOG_API_KEY: ""

      # NuQ PostgreSQL — must point to the custom nuq-postgres image,
      # NOT PropIntel's db (which lacks the nuq schema)
      POSTGRES_HOST: firecrawl-postgres
      POSTGRES_PORT: "5432"
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres

      # NuQ RabbitMQ
      NUQ_RABBITMQ_URL: "amqp://firecrawl-rabbitmq:5672"
    depends_on:
      redis:
        condition: service_healthy
      firecrawl-postgres:
        condition: service_healthy
      firecrawl-rabbitmq:
        condition: service_healthy
      firecrawl-playwright:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3002/v1/health',r=>process.exit(r.statusCode<400?0:1)).on('error',()=>process.exit(1))\""]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: "4.0"
          memory: "6G"
